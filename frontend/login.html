<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Lumina Learn - Welcome to Your Sanctuary</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {

              "on-secondary-fixed-variant": "#1c5385",
              "surface-variant": "#96ece7",

              "surface-container-high": "#a2f1ec",
              "on-secondary": "#edf3ff",

            fontFamily: {
              "headline": ["Lexend"],
              "body": ["Plus Jakarta Sans"],
              "label": ["Plus Jakarta Sans"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: #d4fffb;
    }
    .glass-effect {
      backdrop-filter: blur(12px);
    }
    .tab-btn {
      padding: 0.75rem 1.5rem;
      font-weight: 600;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .tab-btn.active {
      border-bottom-color: var(--primary);
      color: var(--primary);
    }
  </style>
</head>
<body class="bg-background text-on-background min-h-screen flex items-center justify-center p-4 md:p-8">
  <div class="max-w-6xl w-full grid grid-cols-1 lg:grid-cols-2 gap-8 items-center">
    <!-- Left Side - Branding -->
    <div class="hidden lg:flex flex-col space-y-8 pr-12">
      <div class="flex items-center gap-3">
        <div class="w-12 h-12 rounded-lg bg-primary flex items-center justify-center text-on-primary shadow-lg">
          <span class="material-symbols-outlined text-3xl" data-icon="menu_book">menu_book</span>
        </div>
        <span class="font-headline font-extrabold text-2xl tracking-tight text-primary">Lumina Learn</span>
      </div>
      </div>
    </div>

    <!-- Right Side - Form -->
    <div class="bg-surface-container-lowest rounded-xl md:rounded-xl shadow-[0_20px_40px_rgba(0,53,51,0.06)] overflow-hidden border border-outline-variant/10">
      <div class="p-8 md:p-12">
        <!-- Header -->
        <div class="flex flex-col items-center text-center mb-10">
          <div class="lg:hidden mb-6 flex items-center gap-2">
            <span class="material-symbols-outlined text-primary text-3xl" data-icon="menu_book">menu_book</span>
            <span class="font-headline font-extrabold text-xl tracking-tight text-primary">Lumina Learn</span>
          </div>
          <div class="mb-4 relative">
            <div class="w-20 h-20 bg-surface-container rounded-full flex items-center justify-center">
              <span class="material-symbols-outlined text-5xl text-primary" data-icon="face">face</span>
            </div>
            <div class="absolute -bottom-1 -right-1 bg-tertiary-fixed rounded-full p-1 shadow-sm">
              <span class="material-symbols-outlined text-sm text-on-tertiary-fixed" data-icon="verified" data-weight="fill">verified</span>
            </div>
          </div>
        </div>

        <!-- Tab Navigation -->
        <div class="flex gap-6 mb-8 border-b border-surface-container-high">
          <button type="button" class="tab-btn active" id="loginTab" onclick="switchTab('login')">
            Login
          </button>
          <button type="button" class="tab-btn" id="registerTab" onclick="switchTab('register')">
            Create Account
          </button>
        </div>

        <!-- Error Messages -->
        <div id="loginError" style="display:none;" class="mb-4 p-3 bg-error-container text-on-error rounded-lg text-sm"></div>
        <div id="registerError" style="display:none;" class="mb-4 p-3 bg-error-container text-on-error rounded-lg text-sm"></div>

        <!-- Login Tab -->
        <div id="loginForm" class="space-y-6">
          <h2 class="font-headline text-3xl font-bold text-on-background text-center mb-8">Welcome back!</h2>
          <form onsubmit="handleLogin(event)">
            <div class="space-y-4">
              <div class="space-y-2">
                <label class="block text-sm font-bold text-on-surface ml-1" for="username">Username or Email</label>
                <div class="relative">
                  <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-xl" data-icon="alternate_email">alternate_email</span>
                  <input class="w-full bg-surface-container-lowest border-2 border-surface-container-high rounded-lg py-4 pl-12 pr-4 focus:ring-0 focus:border-primary/40 focus:bg-surface-bright transition-colors placeholder:text-outline-variant/60 font-medium" 
                    id="username" placeholder="ReadingHero24" type="text" required/>
                </div>
              </div>

              <div class="space-y-2">
                <div class="flex justify-between items-center px-1">
                  <label class="text-sm font-bold text-on-surface" for="loginPassword">Password</label>
                  <a class="text-xs font-bold text-primary hover:underline" href="#">Forgot?</a>
                </div>
                <div class="relative">
                  <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-xl" data-icon="lock">lock</span>
                  <input class="w-full bg-surface-container-lowest border-2 border-surface-container-high rounded-lg py-4 pl-12 pr-12 focus:ring-0 focus:border-primary/40 focus:bg-surface-bright transition-colors placeholder:text-outline-variant/60" 
                    id="loginPassword" placeholder="••••••••" type="password" required/>
                  <button type="button" class="absolute right-4 top-1/2 -translate-y-1/2 text-outline-variant hover:text-primary transition-colors" onclick="togglePasswordVisibility('loginPassword')">
                    <span class="material-symbols-outlined" data-icon="visibility">visibility</span>
                  </button>
                </div>
              </div>

              <button type="submit" class="w-full py-4 bg-gradient-to-r from-primary to-primary-dim text-on-primary font-headline font-bold rounded-lg shadow-lg hover:shadow-primary/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                Launch Library
                <span class="material-symbols-outlined text-lg" data-icon="rocket_launch">rocket_launch</span>
              </button>
            </div>
          </form>
        </div>

        <!-- Register Tab -->
        <div id="registerForm" style="display:none;" class="space-y-6">
          <h2 class="font-headline text-3xl font-bold text-on-background text-center mb-8">Create Account</h2>
          <form onsubmit="handleRegister(event)">
            <div class="space-y-4">
              <div class="space-y-2">
                <label class="block text-sm font-bold text-on-surface ml-1" for="fullName">Full Name</label>
                <div class="relative">
                  <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-xl" data-icon="person">person</span>
                  <input class="w-full bg-surface-container-lowest border-2 border-surface-container-high rounded-lg py-4 pl-12 pr-4 focus:ring-0 focus:border-primary/40 focus:bg-surface-bright transition-colors placeholder:text-outline-variant/60 font-medium" 
                    id="fullName" placeholder="Sarah Johnson" type="text" required/>
                </div>
              </div>

              <div class="space-y-2">
                <label class="block text-sm font-bold text-on-surface ml-1" for="regUsername">Username</label>
                <div class="relative">
                  <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-xl" data-icon="tag">tag</span>
                  <input class="w-full bg-surface-container-lowest border-2 border-surface-container-high rounded-lg py-4 pl-12 pr-4 focus:ring-0 focus:border-primary/40 focus:bg-surface-bright transition-colors placeholder:text-outline-variant/60 font-medium" 
                    id="regUsername" placeholder="ReadingHero24" type="text" required/>
                </div>
              </div>

              <div class="space-y-2">
                <label class="block text-sm font-bold text-on-surface ml-1" for="email">Email Address</label>
                <div class="relative">
                  <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-xl" data-icon="mail">mail</span>
                  <input class="w-full bg-surface-container-lowest border-2 border-surface-container-high rounded-lg py-4 pl-12 pr-4 focus:ring-0 focus:border-primary/40 focus:bg-surface-bright transition-colors placeholder:text-outline-variant/60 font-medium" 
                    id="email" placeholder="sarah@example.com" type="email" required/>
                </div>
              </div>

              <div class="space-y-2">
                <label class="block text-sm font-bold text-on-surface ml-1" for="grade">Grade Level</label>
                <div class="relative">
                  <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-xl" data-icon="school">school</span>
                  <select class="w-full bg-surface-container-lowest border-2 border-surface-container-high rounded-lg py-4 pl-12 pr-4 focus:ring-0 focus:border-primary/40 focus:bg-surface-bright transition-colors font-medium" 
                    id="grade" required>
                    <option value="">Select your grade</option>
                    <option value="3">Grade 3</option>
                    <option value="4">Grade 4</option>
                    <option value="5">Grade 5</option>
                    <option value="6">Grade 6</option>
                    <option value="7">Grade 7</option>
                    <option value="8">Grade 8</option>
                    <option value="9">Grade 9</option>
                    <option value="10">Grade 10</option>
                    <option value="11">Grade 11</option>
                    <option value="12">Grade 12</option>
                  </select>
                </div>
              </div>

              <div class="space-y-2">
                <label class="block text-sm font-bold text-on-surface ml-1" for="regPassword">Password</label>
                <div class="relative">
                  <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-xl" data-icon="lock">lock</span>
                  <input class="w-full bg-surface-container-lowest border-2 border-surface-container-high rounded-lg py-4 pl-12 pr-12 focus:ring-0 focus:border-primary/40 focus:bg-surface-bright transition-colors placeholder:text-outline-variant/60" 
                    id="regPassword" placeholder="••••••••" type="password" required/>
                  <button type="button" class="absolute right-4 top-1/2 -translate-y-1/2 text-outline-variant hover:text-primary transition-colors" onclick="togglePasswordVisibility('regPassword')">
                    <span class="material-symbols-outlined" data-icon="visibility">visibility</span>
                  </button>
                </div>
              </div>

              <button type="submit" class="w-full py-4 bg-gradient-to-r from-primary to-primary-dim text-on-primary font-headline font-bold rounded-lg shadow-lg hover:shadow-primary/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                Create Account
                <span class="material-symbols-outlined text-lg" data-icon="check_circle">check_circle</span>
              </button>
            </div>
          </form>
        </div>

        <div class="relative my-8">
          <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-surface-container-high"></div>
          </div>
          <div class="relative flex justify-center text-xs">
            <span class="px-4 bg-surface-container-lowest text-outline-variant font-bold tracking-widest uppercase">Or continue with</span>
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <button type="button" class="flex items-center justify-center gap-3 py-3 px-4 bg-surface-container-low hover:bg-surface-container-high text-on-surface text-sm font-bold rounded-lg transition-colors border border-outline-variant/10">
            <img alt="Google" class="w-5 h-5" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCMLwH2Aq4hLJ0qdbMV9qQhIxhiXGXSWmrJZOSMPLc5Mi-54rhy9ZsHn_Bmn_OBoPE9eeOc7tTP4_sMm3LCfLphckaMmp3pxgRSMmo0JE8sC8PQXczCbHv-zZMCsB6GN0IpoGgWDxRef-Dexc-djf8VSin7m5zmQKC_XCySifSv3mAD2z8JTZE_jPTscKM2PJlevGzZYisZVJX-Qy0zE6aifyyrb4vM4FvNMNeex0VVDYh7o53E0-2dWA5Op0trMNQulXwwcs0mcap3"/>
            Google
          </button>
          <button type="button" class="flex items-center justify-center gap-3 py-3 px-4 bg-surface-container-low hover:bg-surface-container-high text-on-surface text-sm font-bold rounded-lg transition-colors border border-outline-variant/10">
            <span class="material-symbols-outlined text-on-secondary-container" data-icon="school">school</span>
            School Account
          </button>
        </div>
      </div>

      <div class="bg-surface-container-high px-8 py-4 flex items-center justify-center gap-6">
        <a class="text-[10px] font-bold text-outline uppercase tracking-tighter hover:text-primary transition-colors" href="#">Privacy Shield</a>
        <div class="w-1 h-1 rounded-full bg-outline-variant/40"></div>
        <a class="text-[10px] font-bold text-outline uppercase tracking-tighter hover:text-primary transition-colors" href="#">Terms of Magic</a>
        <div class="w-1 h-1 rounded-full bg-outline-variant/40"></div>
        <a class="text-[10px] font-bold text-outline uppercase tracking-tighter hover:text-primary transition-colors" href="#">Help Center</a>
      </div>
    </div>
  </div>

  <div class="fixed bottom-6 right-6 lg:bottom-10 lg:right-10 pointer-events-none opacity-20">
    <span class="material-symbols-outlined text-[120px] text-primary select-none" data-icon="auto_awesome">auto_awesome</span>
  </div>

  <script>
    // Check if user is already logged in
    if (localStorage.getItem('user_id')) {
      window.location.href = 'dashboard.html';
    }

    function switchTab(tab) {
      // Update tab buttons
      document.getElementById('loginTab').classList.remove('active');
      document.getElementById('registerTab').classList.remove('active');
      
      // Update forms
      document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
      document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
      
      // Clear error messages
      document.getElementById('loginError').style.display = 'none';
      document.getElementById('registerError').style.display = 'none';
      
      // Set active tab
      if (tab === 'login') {
        document.getElementById('loginTab').classList.add('active');
      } else {
        document.getElementById('registerTab').classList.add('active');
      }
    }

    function togglePasswordVisibility(fieldId) {
      const field = document.getElementById(fieldId);
      const icon = event.target.closest('button').querySelector('.material-symbols-outlined');
      
      if (field.type === 'password') {
        field.type = 'text';
        icon.textContent = 'visibility_off';
      } else {
        field.type = 'password';
        icon.textContent = 'visibility';
      }
    }

    async function handleLogin(e) {
      e.preventDefault();
      const errorDiv = document.getElementById('loginError');
      errorDiv.style.display = 'none';
      
      const identifier = document.getElementById('username').value;
      const password = document.getElementById('loginPassword').value;
      
      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ identifier, password })
        });
        
        const data = await response.json();
        
        if (!response.ok) {
          errorDiv.textContent = data.error || 'Login failed';
          errorDiv.style.display = 'block';
          return;
        }
        
        // Save user data to localStorage
        localStorage.setItem('user_id', data.user_id);
        localStorage.setItem('username', data.username);
        localStorage.setItem('email', data.email);
        localStorage.setItem('name', data.name);
        localStorage.setItem('grade', data.grade);
        localStorage.setItem('total_xp', data.total_xp || 0);
        localStorage.setItem('current_lexile', data.current_lexile || 'N/A');
        localStorage.setItem('current_band', data.current_band || 'N/A');
        
        // Redirect to dashboard
        window.location.href = 'dashboard.html';
      } catch (error) {
        errorDiv.textContent = 'Network error. Please try again.';
        errorDiv.style.display = 'block';
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      const errorDiv = document.getElementById('registerError');
      errorDiv.style.display = 'none';
      
      const name = document.getElementById('fullName').value;
      const username = document.getElementById('regUsername').value;
      const email = document.getElementById('email').value;
      const grade = document.getElementById('grade').value;
      const password = document.getElementById('regPassword').value;
      
      try {
        const response = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, username, email, grade, password })
        });
        
        const data = await response.json();
        
        if (!response.ok) {
          errorDiv.textContent = data.error || 'Registration failed';
          errorDiv.style.display = 'block';
          return;
        }
        
        // Save user data to localStorage
        localStorage.setItem('user_id', data.user_id);
        localStorage.setItem('username', data.username);
        localStorage.setItem('email', data.email);
        localStorage.setItem('name', data.name);
        localStorage.setItem('grade', data.grade);
        localStorage.setItem('total_xp', 0);
        localStorage.setItem('current_lexile', 'N/A');
        localStorage.setItem('current_band', 'N/A');
        
        // Redirect to dashboard
        window.location.href = 'dashboard.html';
      } catch (error) {
        errorDiv.textContent = 'Network error. Please try again.';
        errorDiv.style.display = 'block';
      }
    }
  </script>
</body>
</html>
